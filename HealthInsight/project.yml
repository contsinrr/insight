name: HealthInsight
options:
  bundleIdPrefix: com.personal
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "15.0"
  createIntermediateGroups: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    TARGETED_DEVICE_FAMILY: "1"
    INFOPLIST_KEY_UILaunchScreen_Generation: true
    INFOPLIST_KEY_CFBundleDisplayName: "健康洞察"

targets:
  HealthInsight:
    type: application
    platform: iOS
    deploymentTarget: "17.0"
    sources:
      - path: HealthInsight
        excludes:
          - "**/.DS_Store"
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.personal.healthinsight
        PRODUCT_NAME: HealthInsight
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        SWIFT_EMIT_LOC_STRINGS: "YES"
        GENERATE_INFOPLIST_FILE: "YES"
        INFOPLIST_FILE: "HealthInsight/Info.plist"
        INFOPLIST_KEY_NSHealthShareUsageDescription: "健康洞察需要读取您的健康数据以生成个性化健康分析报告。我们不会上传您的原始健康数据，仅将数据摘要发送到AI服务进行分析。"
        INFOPLIST_KEY_NSHealthUpdateUsageDescription: "健康洞察不会写入任何健康数据。"
        CODE_SIGN_ENTITLEMENTS: "HealthInsight/HealthInsight.entitlements"
    entitlements:
      path: HealthInsight/HealthInsight.entitlements
      properties:
        com.apple.developer.healthkit: true
